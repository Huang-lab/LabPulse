name: Update LabPulse dashboard

# Fetches activity for every configured owner's repos and publishes the
# dashboard to GitHub Pages. Runs on a schedule so new repos and new commits
# are picked up automatically, and can be triggered by hand.

on:
  schedule:
    - cron: "17 6 * * *"      # daily at 06:17 UTC
  workflow_dispatch: {}        # manual "Run workflow" button
  push:
    branches: [main]
    paths:                     # redeploy when the dashboard itself changes
      - "public/**"
      - "config.json"
      - "scripts/fetch_activity.py"
      - ".github/workflows/update-dashboard.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; let a running one finish.
concurrency:
  group: labpulse-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Incremental commit-stats cache. restore-keys always restores the most
      # recent cache; a fresh key each run saves the updated cache.
      - name: Restore fetch cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: labpulse-cache-${{ github.run_id }}
          restore-keys: |
            labpulse-cache-

      - name: Fetch activity
        env:
          # A PAT with read access to the org's repositories is REQUIRED to see
          # repos other than this one (and any private repos). Add it as a repo
          # secret named LABPULSE_TOKEN. Without it, only this repo is counted.
          LABPULSE_TOKEN: ${{ secrets.LABPULSE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/fetch_activity.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
